name: VEDA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: veda
          POSTGRES_PASSWORD: veda
          POSTGRES_DB: veda
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          
      - name: Lint with ruff
        run: |
          cd backend
          pip install ruff
          ruff check app/
          
      - name: Check types with mypy
        run: |
          cd backend
          pip install mypy
          mypy app/
          
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://veda:veda@localhost:5432/veda
          DATABASE_SYNC_URL: postgresql://veda:veda@localhost:5432/veda
          SECRET_KEY: test-secret-key

  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Lint
        run: |
          cd frontend
          npm run lint
          
      - name: Type check
        run: |
          cd frontend
          npm run type-check
          
      - name: Build
        run: |
          cd frontend
          npm run build
